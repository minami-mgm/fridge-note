<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>馬籠家の食卓🍽️</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 0;
  background: #f6f6f6;
}

header {
  background: #fff;
  padding: 12px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

nav {
  display: flex;
  background: #fff;
  border-bottom: 1px solid #ddd;
}

nav button {
  flex: 1;
  padding: 10px;
  border: none;
  background: none;
  font-size: 15px;
}

nav button.active {
  border-bottom: 3px solid #4caf50;
  font-weight: bold;
}

section {
  display: none;
  padding: 10px;
}

section.active {
  display: block;
}

/* ===== 在庫 ===== */
.input-large {
  width: 100%;
  font-size: 16px;
  padding: 8px;
  margin-bottom: 8px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}

.item {
  background: #fff;
  padding: 8px;
  border-radius: 6px;
  font-size: 13px;
}

.bar {
  height: 8px;
  border-radius: 4px;
  margin-top: 6px;
}

.lv4 { background: #2e7d32; }
.lv3 { background: #81c784; }
.lv2 { background: #fff176; }
.lv1 { background: #e57373; }

/* ===== 献立 ===== */
.day {
  background: #fff;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.day.today {
  border: 2px solid #4caf50;
  background: #f0fff3;
}

.day h3 {
  margin: 0 0 6px;
  font-size: 15px;
}

.meal-input {
  width: 100%;
  font-size: 16px;
  padding: 6px;
}

.meal {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  margin-top: 4px;
}

/* ===== 買い物 ===== */
.shop-item {
  display: flex;
  justify-content: space-between;
  background: #fff;
  padding: 8px;
  margin-bottom: 6px;
  font-size: 15px;
}
</style>
</head>

<body>
<header>馬籠家の食卓🍽️</header>

<nav>
  <button class="active" onclick="openTab(0)">在庫</button>
  <button onclick="openTab(1)">献立</button>
  <button onclick="openTab(2)">買い物</button>
</nav>

<!-- 在庫 -->
<section class="active">
  <input class="input-large" id="foodInput" placeholder="食材を追加">
  <div class="grid" id="foods"></div>
</section>

<!-- 献立 -->
<section>
  <div id="menu"></div>
</section>

<!-- 買い物 -->
<section>
  <input class="input-large" id="shopInput" placeholder="買うものを追加">
  <div id="shopList"></div>
</section>

<script>
/* ===== タブ ===== */
function openTab(i) {
  document.querySelectorAll("section").forEach((s, n) => s.classList.toggle("active", n === i));
  document.querySelectorAll("nav button").forEach((b, n) => b.classList.toggle("active", n === i));
}

/* ===== 在庫 ===== */
const foods = document.getElementById("foods");
document.getElementById("foodInput").onkeydown = e => {
  if (e.key === "Enter" && e.target.value) {
    const div = document.createElement("div");
    div.className = "item";
    let level = 4;

    const bar = document.createElement("div");
    bar.className = "bar lv4";

    bar.onclick = () => {
      level = level === 1 ? 4 : level - 1;
      bar.className = "bar lv" + level;
    };

    div.innerHTML = `<div>${e.target.value}</div>`;
    div.appendChild(bar);
    foods.appendChild(div);
    e.target.value = "";
  }
};

/* ===== 献立 ===== */
const days = ["日","月","火","水","木","金","土"];
const menu = document.getElementById("menu");
const today = new Date();
const todayIndex = today.getDay();

for (let i = 0; i < 7; i++) {
  const date = new Date();
  date.setDate(today.getDate() + i);
  const dayIndex = date.getDay();

  const div = document.createElement("div");
  div.className = "day" + (dayIndex === todayIndex ? " today" : "");

  div.innerHTML = `
    <h3>${date.getMonth()+1}/${date.getDate()}（${days[dayIndex]}）</h3>
    <input class="meal-input" placeholder="料理名">
  `;

  const input = div.querySelector("input");
  input.onkeydown = e => {
    if (e.key === "Enter" && input.value) {
      const meal = document.createElement("div");
      meal.className = "meal";
      meal.innerHTML = `<span>${input.value}</span><button onclick="this.parentNode.remove()">削除</button>`;
      div.appendChild(meal);
      input.value = "";
    }
  };

  menu.appendChild(div);
}

/* ===== 買い物 ===== */
const shopList = document.getElementById("shopList");
document.getElementById("shopInput").onkeydown = e => {
  if (e.key === "Enter" && e.target.value) {
    const div = document.createElement("div");
    div.className = "shop-item";
    div.innerHTML = `<span>${e.target.value}</span><button onclick="this.parentNode.remove()">削除</button>`;
    shopList.appendChild(div);
    e.target.value = "";
  }
};
</script>
</body>
</html>
