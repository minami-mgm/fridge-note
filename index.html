<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Fridge Note</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f7f7;
      padding: 16px;
    }
    h1 {
      text-align: center;
    }
    h2 {
      margin-top: 24px;
    }
    .item {
      background: #fff;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .bar {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    .bar span {
      flex: 1;
      height: 14px;
      background: #ddd;
      border-radius: 4px;
    }
    .bar span.active {
      background: #4caf50;
    }
    input, textarea, button {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      font-size: 16px;
    }
    button {
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 6px;
    }
    textarea {
      min-height: 80px;
    }
  </style>
</head>
<body>

<h1>🥕 冷蔵庫メモ</h1>

<h2>🧊 食材</h2>
<div id="items"></div>

<input id="newItem" placeholder="食材名を追加" />
<button onclick="addItem()">追加</button>

<h2>🍳 献立メモ</h2>
<textarea id="menuMemo" placeholder="今日の献立・作りたいメモ"></textarea>

<script>
let state = JSON.parse(localStorage.getItem("fridgeState") || "{}");
let menuMemo = localStorage.getItem("menuMemo") || "";

const itemsDiv = document.getElementById("items");
const memoArea = document.getElementById("menuMemo");
memoArea.value = menuMemo;

memoArea.addEventListener("input", () => {
  localStorage.setItem("menuMemo", memoArea.value);
});

function saveState() {
  localStorage.setItem("fridgeState", JSON.stringify(state));
}

function render() {
  itemsDiv.innerHTML = "";
  Object.keys(state).forEach(id => {
    const item = document.createElement("div");
    item.className = "item";

    const name = document.createElement("strong");
    name.textContent = id;

    const bar = document.createElement("div");
    bar.className = "bar";
    bar.onclick = () => {
      state[id] = (state[id] + 1) % 5;
      saveState();
      render();
    };

    for (let i = 0; i < 4; i++) {
      const span = document.createElement("span");
      if (i < state[id]) span.classList.add("active");
      bar.appendChild(span);
    }

    item.appendChild(name);
    item.appendChild(bar);
    itemsDiv.appendChild(item);
  });
}

function addItem() {
  const input = document.getElementById("newItem");
  const name = input.value.trim();
  if (!name || state[name] !== undefined) return;
  state[name] = 0;
  input.value = "";
  saveState();
  render();
}

render();
</script>

</body>
</html>
