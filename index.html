<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>馬籠家の食卓🍽️</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 0;
  background: #f6f6f6;
}

header {
  background: #fff;
  padding: 12px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

nav {
  display: flex;
  background: #fff;
  border-bottom: 1px solid #ddd;
}

nav button {
  flex: 1;
  padding: 10px;
  border: none;
  background: none;
  font-size: 15px;
}

nav button.active {
  border-bottom: 3px solid #4caf50;
  font-weight: bold;
}

section {
  display: none;
  padding: 10px;
}

section.active {
  display: block;
}

/* ===== 献立 ===== */
.week {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.day {
  background: #fff;
  padding: 8px;
  border-radius: 8px;
}

.day.today {
  border: 2px solid #4caf50;
  background: #f0fff3;
}

.day h3 {
  margin: 0 0 6px;
  font-size: 14px;
}

.meal-input {
  width: 100%;
  font-size: 16px;
  padding: 6px;
}

.meal {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-top: 4px;
}

/* ===== 在庫 ===== */
.input-large {
  width: 100%;
  font-size: 16px;
  padding: 8px;
  margin-bottom: 8px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}

.item {
  background: #fff;
  padding: 6px;
  border-radius: 6px;
  font-size: 13px;
}

.bar {
  height: 8px;
  border-radius: 4px;
  margin-top: 4px;
}

.lv4 { background: #2e7d32; }
.lv3 { background: #81c784; }
.lv2 { background: #fff176; }
.lv1 { background: #e57373; }

/* ===== 買い物 ===== */
.shop-item {
  display: flex;
  justify-content: space-between;
  background: #fff;
  padding: 6px;
  margin-bottom: 4px;
  font-size: 14px;
}
</style>
</head>

<body>
<header>馬籠家の食卓🍽️</header>

<nav>
  <button class="active" onclick="openTab(0)">献立</button>
  <button onclick="openTab(1)">在庫</button>
  <button onclick="openTab(2)">買い物</button>
</nav>

<!-- 献立 -->
<section class="active">
  <div class="week" id="week"></div>
</section>

<!-- 在庫 -->
<section>
  <input class="input-large" id="foodInput" placeholder="食材を追加">
  <div class="grid" id="foods"></div>
</section>

<!-- 買い物 -->
<section>
  <input class="input-large" id="shopInput" placeholder="買うものを追加">
  <div id="shopList"></div>
</section>

<script>
/* ===== タブ ===== */
function openTab(i) {
  document.querySelectorAll("section").forEach((s, n) => s.classList.toggle("active", n === i));
  document.querySelectorAll("nav button").forEach((b, n) => b.classList.toggle("active", n === i));
}

/* ===== 献立 ===== */
const days = ["日","月","火","水","木","金","土"];
const today = new Date().getDay();
const week = document.getElementById("week");

days.forEach((d, i) => {
  const div = document.createElement("div");
  div.className = "day" + (i === today ? " today" : "");
  div.innerHTML = `<h3>${d}</h3><input class="meal-input" placeholder="料理名">`;
  const input = div.querySelector("input");
  input.onkeydown = e => {
    if (e.key === "Enter" && input.value) {
      const m = document.createElement("div");
      m.className = "meal";
      m.innerHTML = `<span>${input.value}</span><button onclick="this.parentNode.remove()">削除</button>`;
      div.appendChild(m);
      input.value = "";
    }
  };
  week.appendChild(div);
});

/* ===== 在庫 ===== */
const foods = document.getElementById("foods");
document.getElementById("foodInput").onkeydown = e => {
  if (e.key === "Enter" && e.target.value) {
    const lv = Math.floor(Math.random() * 4) + 1;
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `${e.target.value}
      <div class="bar lv${lv}"></div>`;
    foods.appendChild(div);
    e.target.value = "";
  }
};

/* ===== 買い物 ===== */
const shopList = document.getElementById("shopList");
document.getElementById("shopInput").onkeydown = e => {
  if (e.key === "Enter" && e.target.value) {
    const div = document.createElement("div");
    div.className = "shop-item";
    div.innerHTML = `<span>${e.target.value}</span><button onclick="this.parentNode.remove()">削除</button>`;
    shopList.appendChild(div);
    e.target.value = "";
  }
};
</script>
</body>
</html>
