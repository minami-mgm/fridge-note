<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>馬籠家の食卓🍽️</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 0;
  background: #f6f6f6;
}

header {
  background: #fff;
  padding: 12px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

nav {
  display: flex;
  background: #fff;
  border-bottom: 1px solid #ddd;
}

nav button {
  flex: 1;
  padding: 10px;
  border: none;
  background: none;
  font-size: 15px;
}

nav button.active {
  border-bottom: 3px solid #4caf50;
  font-weight: bold;
}

section {
  display: none;
  padding: 10px;
}

section.active {
  display: block;
}

/* ===== 共通 ===== */
.input-large {
  width: 100%;
  font-size: 16px;
  padding: 8px;
  margin-bottom: 8px;
}

/* ===== 在庫 ===== */
.category {
  margin-bottom: 12px;
}

.category h3 {
  margin: 6px 0;
  font-size: 14px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}

.item {
  background: #fff;
  padding: 8px;
  border-radius: 6px;
  font-size: 13px;
  display: flex;
  flex-direction: column;
}

.item-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.bar {
  display: flex;
  gap: 2px;
  margin-top: 6px;
  cursor: pointer;
}

.bar div {
  flex: 1;
  height: 8px;
  border-radius: 3px;
  background: #ddd;
}

.bar.lv1 div:nth-child(1) { background: #4caf50; }
.bar.lv2 div:nth-child(-n+2) { background: #4caf50; }
.bar.lv3 div { background: #4caf50; }

/* ===== 献立 ===== */
.day {
  background: #fff;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.day.today {
  border: 2px solid #4caf50;
  background: #f0fff3;
}

.day h3 {
  margin: 0 0 6px;
  font-size: 15px;
}

.meal-input {
  width: 100%;
  font-size: 16px;
  padding: 6px;
}

.meal {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  margin-top: 4px;
}

/* ===== 買い物 ===== */
.shop-item {
  display: flex;
  justify-content: space-between;
  background: #fff;
  padding: 8px;
  margin-bottom: 6px;
  font-size: 15px;
}
</style>
</head>

<body>
<header>馬籠家の食卓🍽️</header>

<nav>
  <button class="active" onclick="openTab(0)">在庫</button>
  <button onclick="openTab(1)">献立</button>
  <button onclick="openTab(2)">買い物</button>
</nav>

<!-- 在庫 -->
<section class="active">
  <input class="input-large" id="foodInput" placeholder="食材名">
  <select id="categorySelect" class="input-large">
    <option value="冷蔵庫">冷蔵庫</option>
    <option value="冷凍庫">冷凍庫</option>
    <option value="その他">その他</option>
  </select>

  <div id="inventory"></div>
</section>

<!-- 献立 -->
<section>
  <div id="menu"></div>
</section>

<!-- 買い物 -->
<section>
  <input class="input-large" id="shopInput" placeholder="買うものを追加">
  <div id="shopList"></div>
</section>

<script>
/* ===== タブ ===== */
function openTab(i) {
  document.querySelectorAll("section").forEach((s, n) => s.classList.toggle("active", n === i));
  document.querySelectorAll("nav button").forEach((b, n) => b.classList.toggle("active", n === i));
}

/* ===== 在庫 ===== */
const inventory = {};
["冷蔵庫","冷凍庫","その他"].forEach(c => {
  inventory[c] = document.createElement("div");
  inventory[c].innerHTML = `<div class="category"><h3>${c}</h3><div class="grid"></div></div>`;
  document.getElementById("inventory").appendChild(inventory[c]);
});

document.getElementById("foodInput").onkeydown = e => {
  if (e.key === "Enter" && e.target.value) {
    const name = e.target.value;
    const cat = document.getElementById("categorySelect").value;
    const grid = inventory[cat].querySelector(".grid");

    let level = 3;
    const item = document.createElement("div");
    item.className = "item";

    const bar = document.createElement("div");
    bar.className = "bar lv3";
    bar.innerHTML = "<div></div><div></div><div></div>";
    bar.onclick = () => {
      level = level === 1 ? 3 : level - 1;
      bar.className = "bar lv" + level;
    };

    item.innerHTML = `
      <div class="item-top">
        <span>${name}</span>
        <button onclick="this.closest('.item').remove()">削除</button>
      </div>
    `;
    item.appendChild(bar);
    grid.appendChild(item);
    e.target.value = "";
  }
};

/* ===== 献立 ===== */
const days = ["日","月","火","水","木","金","土"];
const menu = document.getElementById("menu");
const today = new Date();

for (let i = -2; i <= 3; i++) {
  const date = new Date();
  date.setDate(today.getDate() + i);
  const dayIndex = date.getDay();

  const div = document.createElement("div");
  div.className = "day" + (i === 0 ? " today" : "");

  div.innerHTML = `
    <h3>${date.getMonth()+1}/${date.getDate()}（${days[dayIndex]}）</h3>
    <input class="meal-input" placeholder="料理名">
  `;

  const input = div.querySelector("input");
  input.onkeydown = e => {
    if (e.key === "Enter" && input.value) {
      const meal = document.createElement("div");
      meal.className = "meal";
      meal.innerHTML = `<span>${input.value}</span><button onclick="this.parentNode.remove()">削除</button>`;
      div.appendChild(meal);
      input.value = "";
    }
  };

  menu.appendChild(div);
}

/* ===== 買い物 ===== */
const shopList = document.getElementById("shopList");
document.getElementById("shopInput").onkeydown = e => {
  if (e.key === "Enter" && e.target.value) {
    const div = document.createElement("div");
    div.className = "shop-item";
    div.innerHTML = `<span>${e.target.value}</span><button onclick="this.parentNode.remove()">削除</button>`;
    shopList.appendChild(div);
    e.target.value = "";
  }
};
</script>
</body>
</html>
