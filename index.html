<!DOCTYPE html>

  <style>
    body {

      background: #f7f7f7;
      padding: 16px;
    }
    h1 {
      text-align: center;
    }
    .item {
      background: #fff;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .bar {

      margin-top: 8px;
    }
    .bar span {

      height: 12px;
      background: #ddd;
      border-radius: 4px;
    }
    .bar span.active {
      background: #4caf50;
    }
  </style>
</head>
<body>

</div>

</body>
</html>
