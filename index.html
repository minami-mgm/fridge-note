<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>馬籠家の食卓🍽️</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 0;
  background: #f6f6f6;
}

header {
  background: #fff;
  padding: 12px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

nav {
  display: flex;
  background: #fff;
  border-bottom: 1px solid #ddd;
}

nav button {
  flex: 1;
  padding: 10px;
  border: none;
  background: none;
  font-size: 15px;
}

nav button.active {
  border-bottom: 3px solid #4caf50;
  font-weight: bold;
}

section {
  display: none;
  padding: 10px;
}

section.active {
  display: block;
}

.input-large {
  width: 100%;
  font-size: 16px;
  padding: 8px;
  margin-bottom: 8px;
}

/* ===== 在庫カテゴリ ===== */
.category {
  margin-bottom: 14px;
  padding: 8px;
  border-radius: 10px;
}

.category.rei { background: #e8f4ff; border: 2px solid #90caf9; }
.category.to { background: #e8fff0; border: 2px solid #81c784; }
.category.other { background: #fff8e1; border: 2px solid #ffcc80; }

.category h3 {
  margin: 4px 0 8px;
  font-size: 14px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}

.item {
  background: #fff;
  padding: 8px;
  border-radius: 6px;
  font-size: 13px;
  display: flex;
  flex-direction: column;
}

.item-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ===== 残量バー（5段階） ===== */
.bar {
  display: flex;
  gap: 2px;
  margin-top: 6px;
  cursor: pointer;
}

.bar div {
  flex: 1;
  height: 8px;
  border-radius: 3px;
  background: #ddd;
}

/* 残量 */
.bar.lv3 div { background: #4caf50; }                 /* ■■■ 緑 */
.bar.lv2 div:nth-child(-n+2) { background: #ff9800; } /* ■■□ オレンジ */
.bar.lv1 div:nth-child(1) { background: #f44336; }    /* ■□□ 赤 */
.bar.lv0 div { background: #ccc; }                    /* □□□ グレー */

/* ===== 献立 ===== */
.day {
  background: #fff;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.day.today {
  border: 2px solid #4caf50;
  background: #f0fff3;
}

.day h3 {
  margin: 0 0 6px;
  font-size: 15px;
}

.meal-input {
  width: 100%;
  font-size: 16px;
  padding: 6px;
}

.meal {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  margin-top: 4px;
}

/* ===== 買い物 ===== */
.shop-item {
  display: flex;
  justify-content: space-between;
  background: #fff;
  padding: 8px;
  margin-bottom: 6px;
  font-size: 15px;
}
</style>
</head>

<body>
<header>馬籠家の食卓🍽️</header>

<nav>
  <button class="active" onclick="openTab(0)">在庫</button>
  <button onclick="openTab(1)">献立</button>
  <button onclick="openTab(2)">買い物</button>
</nav>

<!-- 在庫 -->
<section class="active">
  <input class="input-large" id="foodInput" placeholder="食材名">
  <select id="categorySelect" class="input-large">
    <option value="冷蔵庫">冷蔵庫</option>
    <option value="冷凍庫">冷凍庫</option>
    <option value="その他">その他</option>
  </select>
  <div id="inventory"></div>
</section>

<!-- 献立 -->
<section>
  <div id="menu"></div>
</section>

<!-- 買い物 -->
<section>
  <input class="input-large" id="shopInput" placeholder="買うものを追加">
  <div id="shopList"></div>
</section>

<script>
/* ===== 保存 ===== */
const save = (k,d) => localStorage.setItem(k, JSON.stringify(d));
const load = (k,d) => JSON.parse(localStorage.getItem(k)) || d;

/* ===== タブ ===== */
function openTab(i) {
  document.querySelectorAll("section").forEach((s,n)=>s.classList.toggle("active",n===i));
  document.querySelectorAll("nav button").forEach((b,n)=>b.classList.toggle("active",n===i));
}

/* ===== 在庫 ===== */
const inventoryData = load("inventory", []);
const inventory = {};
const catClass = { "冷蔵庫":"rei","冷凍庫":"to","その他":"other" };

Object.keys(catClass).forEach(c=>{
  const d=document.createElement("div");
  d.className=`category ${catClass[c]}`;
  d.innerHTML=`<h3>${c}</h3><div class="grid"></div>`;
  inventory[c]=d.querySelector(".grid");
  document.getElementById("inventory").appendChild(d);
});

function renderInventory(){
  Object.values(inventory).forEach(g=>g.innerHTML="");
  inventoryData.forEach((it,i)=>{
    const item=document.createElement("div");
    item.className="item";

    let level=it.level;
    const bar=document.createElement("div");
    bar.className="bar lv"+level;
    bar.innerHTML="<div></div><div></div><div></div>";
    bar.onclick=()=>{
      level = level===0 ? 3 : level-1;
      it.level=level;
      bar.className="bar lv"+level;
      save("inventory",inventoryData);
    };

    item.innerHTML=`
      <div class="item-top">
        <span>${it.name}</span>
        <button onclick="removeItem(${i})">削除</button>
      </div>`;
    item.appendChild(bar);
    inventory[it.cat].appendChild(item);
  });
}

function removeItem(i){
  inventoryData.splice(i,1);
  save("inventory",inventoryData);
  renderInventory();
}

foodInput.onkeydown=e=>{
  if(e.key==="Enter" && e.target.value){
    inventoryData.push({name:e.target.value,cat:categorySelect.value,level:3});
    save("inventory",inventoryData);
    e.target.value="";
    renderInventory();
  }
};

renderInventory();
</script>
</body>
</html>
