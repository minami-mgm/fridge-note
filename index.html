<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>馬籠家の食卓</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: system-ui, -apple-system, sans-serif;
  margin: 0;
  background: #fafafa;
}

header {
  background: #f4a261;
  color: white;
  padding: 12px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

nav {
  display: flex;
  background: white;
  border-bottom: 1px solid #ddd;
}

nav button {
  flex: 1;
  padding: 10px;
  border: none;
  background: none;
  font-size: 14px;
}

nav button.active {
  background: #ffe8d6;
  font-weight: bold;
}

section {
  display: none;
  padding: 12px;
}

section.active {
  display: block;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 10px;
}

.past { background: #eee; }
.today { background: #ffe0b2; }
.future { background: #fff3bf; }

h3 {
  margin: 4px 0;
  font-size: 15px;
}

input, select, button {
  padding: 6px;
  font-size: 14px;
}

.list-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.small {
  font-size: 12px;
  color: #666;
}

.action-btn {
  width: 100%;
  margin-top: 10px;
  background: #f4a261;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 10px;
}
</style>
</head>

<body>

<header>馬籠家の食卓</header>

<nav>
  <button class="active" onclick="showTab('toppage')">献立</button>
  <button onclick="showTab('ryota')">凌大ごはん</button>
  <button onclick="showTab('shopping')">買い物</button>
  <button onclick="showTab('stock')">在庫</button>
</nav>

<!-- 献立 -->
<section id="toppage" class="active">
  <div class="card past">
    <h3>昨日</h3>
    <div class="small">カレー</div>
  </div>
  <div class="card today">
    <h3>今日</h3>
    <div>焼き魚・味噌汁</div>
  </div>
  <div class="card future">
    <h3>明日</h3>
    <div>親子丼</div>
  </div>
  <div class="card future">
    <h3>明後日</h3>
    <div>シチュー</div>
  </div>
</section>

<!-- 凌大ごはん -->
<section id="ryota">
  <div class="card past">
    <h3>昨日</h3>
    朝：野菜がゆ<br>夕：豆腐煮
  </div>
  <div class="card today">
    <h3>今日</h3>
    朝：パンがゆ<br>夕：鶏そぼろ
  </div>
  <div class="card future">
    <h3>明日</h3>
    朝：うどん<br>夕：白身魚
  </div>
  <div class="card future">
    <h3>明後日</h3>
    朝：おかゆ<br>夕：野菜煮
  </div>
</section>

<!-- 買い物 -->
<section id="shopping">
  <div class="card">
    <div class="list-item">
      <input type="checkbox" class="buy"> 玉ねぎ
    </div>
    <div class="list-item">
      <input type="checkbox" class="buy"> 牛乳
    </div>
    <div class="list-item">
      <input type="checkbox" class="buy"> 冷凍うどん
    </div>

    <button onclick="checkAll()">すべてチェック</button>
    <button class="action-btn" onclick="toStockConfirm()">在庫に入れる</button>
  </div>
</section>

<!-- 在庫 -->
<section id="stock">
  <div id="stockArea"></div>
</section>

<script>
function showTab(id) {
  document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function checkAll() {
  document.querySelectorAll('.buy').forEach(c => c.checked = true);
}

function classify(name) {
  if (name.includes('冷凍')) return '冷凍庫';
  if (['牛乳','肉','魚','野菜','玉ねぎ'].some(v => name.includes(v))) return '冷蔵庫';
  return 'その他';
}

function toStockConfirm() {
  const stockArea = document.getElementById('stockArea');
  stockArea.innerHTML = '';
  document.querySelectorAll('.buy:checked').forEach(item => {
    const name = item.parentElement.textContent.trim();
    const cat = classify(name);
    stockArea.innerHTML += `
      <div class="card">
        ${name}
        <select>
          <option ${cat==='冷蔵庫'?'selected':''}>冷蔵庫</option>
          <option ${cat==='冷凍庫'?'selected':''}>冷凍庫</option>
          <option ${cat==='その他'?'selected':''}>その他</option>
        </select>
      </div>`;
  });
  showTab('stock');
}
</script>

</body>
</html>
